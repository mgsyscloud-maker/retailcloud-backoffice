services:
  - type: web
    name: retailcloud-backoffice
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retailcloud-db
          property: connectionString
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SYNC_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: retailcloud-db
    plan: free
